<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gengo Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --ink: #c9d1d9;
      --ink-muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --err: #f85149;
      --header-height: 56px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .logo svg { width: 24px; height: 24px; fill: var(--accent); }

    .actions { display: flex; gap: 12px; align-items: center; }

    button {
      appearance: none;
      background: var(--accent);
      color: #fff;
      border: 1px solid rgba(240,246,252,0.1);
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #30363d; }
    button.secondary:hover:not(:disabled) { background: #3fb95033; border-color: #3fb950; color: #3fb950; }

    main {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    @media (max-width: 800px) {
      main { flex-direction: column; }
    }

    .editor-container, .output-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .output-container {
      border-left: 1px solid var(--border);
      background: var(--panel);
    }
    @media (max-width: 800px) {
      .output-container { border-left: 0; border-top: 1px solid var(--border); }
    }

    .pane-title {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #editor { flex: 1; width: 100%; height: 100%; }

    #out {
      flex: 1;
      margin: 0;
      padding: 16px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .status-bar {
      height: 32px;
      padding: 0 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink-muted);
      background: var(--bg);
    }

    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      background: var(--border);
      color: var(--ink);
    }
    .badge.success { color: var(--accent); background: #3fb9501a; }
    .badge.error { color: var(--err); background: #f851491a; }

    /* Monaco overrides */
    .monaco-editor, .monaco-editor .margin, .monaco-editor-background {
      background-color: var(--bg) !important;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      Gengo
    </div>
    <div class="actions">
      <select id="examples" style="background: var(--panel); color: var(--ink); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 13px; outline: none; cursor: pointer;">
        <option value="" disabled hidden>Examples</option>
        <option value="hello">Hello World</option>
        <option value="variables">Variables &amp; Types</option>
        <option value="control_flow">Control Flow</option>
        <option value="functions">Functions</option>
        <option value="closures">Closures</option>
        <option value="structs">Structs &amp; Methods</option>
        <option value="interfaces">Interfaces</option>
        <option value="enums">Enums</option>
        <option value="variants">Variants</option>
        <option value="named_types">Named Types</option>
        <option value="arrays">Arrays</option>
        <option value="maps">Maps</option>
        <option value="strings">Strings</option>
        <option value="multiline">Multiline Strings</option>
        <option value="errors">Error Handling</option>
        <option value="defer_recover">Defer &amp; Recover</option>
        <option value="simlab">Simulation</option>
        <option value="maze">Maze</option>
      </select>
      <button id="share" class="secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        Share
      </button>
      <button id="run">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Run
      </button>
      <button id="stop" class="secondary" disabled>Stop</button>
    </div>
  </header>
  <main>
    <div class="editor-container">
      <div class="pane-title">script.gengo</div>
      <div id="editor"></div>
    </div>
    <div class="output-container">
      <div class="pane-title">
        Output
        <span id="exec-info" style="font-weight: normal; text-transform: none;"></span>
      </div>
      <pre id="out"></pre>
      <div class="status-bar">
        <div id="status">Idle</div>
        <div id="version">Gengo v0.1 (WASM)</div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script type="module" src="./playground.js?v=a22fd13c"></script>
</body>
</html>
